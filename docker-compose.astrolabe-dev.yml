# TEMPORARY (PR #1106) — remove once Astrolabe publishes an NC-34 release.
#
# Overlays the locally-built third_party/astrolabe submodule onto the app
# service, so the post-installation hook symlinks that build into custom_apps
# instead of installing the published app from the app store.
#
# Needed because the app store has no NC-34-compatible Astrolabe release yet:
# `occ app:install astrolabe` fails on Nextcloud 34 with "App "Astrolabe"
# cannot be installed because it is not compatible with this version of the
# server" (appinfo declares max-version="33"). The submodule is pinned to
# cbcoutinho/astrolabe#242, which raises that bound to 34.
#
# Applied as an override ONLY by the nc34 integration lanes (see the
# `compose-files` matrix property in .github/workflows/test.yml). Deliberately
# NOT enabled in docker-compose.yml, because that would:
#   - test NC 32/33 against the unpublished fork rather than the published app,
#     losing coverage of the actual production configuration, and
#   - break every other job that brings this stack up without building the
#     submodule first (the `docling` lane and pact provider verification both
#     failed this way in 32ef80e1 — an unbuilt checkout has no vendor/ or js/,
#     so `occ app:enable` aborts).
#
# Any job using this override MUST run the "Build Astrolabe app" step first.
services:
  app:
    volumes:
      - ./third_party/astrolabe:/opt/apps/astrolabe:ro
